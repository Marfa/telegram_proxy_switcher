name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore TelegramLauncher/TelegramLauncher.csproj

      - name: Check vulnerable packages
        shell: pwsh
        run: |
          $output = dotnet list TelegramLauncher/TelegramLauncher.csproj package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Output $output
          if ($output -match 'has the following vulnerable packages') {
            Write-Error 'Vulnerable NuGet packages found'
            exit 1
          }

      - name: Build
        run: dotnet build TelegramLauncher/TelegramLauncher.csproj --no-restore -c Release

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
